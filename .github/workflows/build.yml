name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake libtool libltdl-dev m4 pkg-config libffi-dev libssl-dev zlib1g-dev cmake
          python -m pip install --upgrade pip
          pip install Cython==0.29.37
          pip install git+https://github.com/kivy/buildozer.git

      - name: Clean caches
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf ~/.gradle

      - name: Build APK
        run: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
